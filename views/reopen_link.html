<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>🔗 Reopen Link</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
</head>

<body class="p-5 bg-light">
    <div class="container">
        <h2>🔍 Re-open Link for Follow Up</h2>

        <div class="row my-3">
            <div class="col-md-6">
                <div class="input-group mt-2">
                    <div class="input-group-prepend">
                        <span class="input-group-text bg-info text-white">📞 Nomor Telepon</span>
                    </div>
                    <input type="text" class="form-control" id="phone" placeholder="Masukkan nomor telepon . . ."
                        autocomplete="tel">
                </div>
            </div>
            <div class="col-md-6">
                <div class="input-group mt-2">
                    <div class="input-group-prepend">
                        <span class="input-group-text bg-info text-white">🏪 Nama Merchant</span>
                    </div>
                    <input type="text" class="form-control" id="merchant" placeholder="Masukkan nama merchant . . ."
                        autocomplete="organization">
                </div>
            </div>
        </div>

        <button class="btn btn-primary mb-5 w-100" id="filterBtn">Submit</button>

        <table id="reopenTable" class="table table-bordered table-striped table-hover mt-2">
            <thead class="table-dark">
                <tr>
                    <th class="hidden">ID</th>
                    <th>Nomor Telepon PIC / Owner</th>
                    <th>Merchant</th>
                    <th>WO Number</th>
                    <th>JO / Ticket Subject (SPK Number)</th>
                    <th>Terakhir Difollow-Up Oleh</th>
                    <th>Difollow-Up Pada</th>
                    <th>Feedback</th>
                    <th>Action</th>
                </tr>
            </thead>
        </table>
    </div>

    <script>
        let table;

        function initTable() {
            const phone = $('#phone').val();
            const merchant = $('#merchant').val();

            if (table) {
                table.clear().destroy();
            }

            table = $('#reopenTable').DataTable({
                processing: true,
                serverSide: true,
                ajax: {
                    url: '/re-open-data',
                    type: 'POST',
                    data: function (d) {
                        d.phone = phone;
                        d.merchant = merchant;
                    },
                    error: function (xhr) {
                        let msg = xhr.responseJSON?.error || "Unknown error";

                        // 🔥 Reset table to blank so it's not stuck
                        if (table) {
                            table.clear().draw();
                        }

                        Swal.fire("🚨 Error", msg, "error");
                    }
                },
                columns: [
                    { data: 0, visible: false },
                    { data: 1 },
                    { data: 2 },
                    { data: 3 },
                    { data: 4 },
                    { data: 5 },
                    { data: 6 },
                    { data: 7 },
                    {
                        data: 8,
                        orderable: false,
                        searchable: false,
                        render: function (data, type, row) {
                            const id = row[0];
                            const phoneNumber = row[1];
                            const merchantName = row[2];
                            return `<button class="btn btn-sm btn-info text-white" onclick="reOpenLink('${id}', '${phoneNumber}', '${merchantName}')">🔍 Buka Kembali Linknya</button>`;
                        }
                    }
                ]
            });
        }

        function reOpenLink(id, phone, merchant) {
            Swal.fire({
                icon: 'question',
                title: 'Konfirmasi',
                html: `
                    <p><span class="badge bg-light text-dark">[${id}]</span> Apakah kamu ingin membuka kembali link untuk <b>Merchant:</b> <i>${merchant}</i> dengan <b>Nomor Telepon:</b> <i>${phone}</i>?</p>
                `,
                showCancelButton: true,
                confirmButtonText: 'Ya, buka kembali!',
                cancelButtonText: 'Batal',
                allowOutsideClick: false,
                allowEscapeKey: false
            }).then((result) => {
                if (result.isConfirmed) {
                    $.ajax({
                        url: '/re-open-link',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ id: id }),
                        success: function (response) {
                            Swal.fire({
                                icon: "info",
                                title: "🔗 Link Baru",
                                html: `<a href="${response.link}" target="_blank">${response.link}</a>`,
                                confirmButtonText: "Oke",
                                allowOutsideClick: false,
                                allowEscapeKey: false,
                                allowEnterKey: true
                            }).then(() => {
                                if (table) {
                                    table.ajax.reload(null, false); // false to keep current page
                                }
                            });
                        },
                        error: function (xhr) {
                            const msg = xhr.responseJSON?.error || "Unknown error";
                            Swal.fire("❌ Gagal", msg, "error");
                        }
                    });
                }
            });
        }

        $(document).ready(function () {
            $('#filterBtn').on('click', function () {
                initTable();
            });
        });
    </script>
</body>

</html>
